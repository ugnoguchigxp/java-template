server:
  address: ${HOST:127.0.0.1}
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: java25-postgresql-template
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:development}
  jackson:
    default-property-inclusion: non_null

mybatis:
  mapper-locations: classpath*:mybatis/postgresql/*.xml
  type-aliases-package: com.example.javastandard.db.model
  configuration:
    map-underscore-to-camel-case: true
    local-cache-scope: statement
    jdbc-type-for-null: null

app:
  database-url: ${DATABASE_URL:jdbc:postgresql://127.0.0.1:5432/java_template}
  jwt-secret: ${JWT_SECRET:development-only-change-me-please-32-characters}
  jwt-access-ttl: ${JWT_ACCESS_TTL:15m}
  jwt-refresh-ttl: ${JWT_REFRESH_TTL:30d}
  app-url: ${APP_URL:http://localhost:5173}
  cors-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  cookie-secure: ${AUTH_COOKIE_SECURE:false}
  cookie-same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
